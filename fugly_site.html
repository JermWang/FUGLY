<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FUGLY FAM — ETH WHITELIST</title>

    <link rel="icon" href="/artwork/FUGLYlabs.jpg" type="image/x-icon">
    <link rel="icon" href="/artwork/FUGLYlabs.jpg" type="image/png" sizes="16x16">
    <link rel="icon" href="/artwork/FUGLYlabs.jpg" type="image/png" sizes="32x32">
    <link rel="apple-touch-icon" href="/artwork/FUGLYlabs.jpg">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;700&family=Space+Grotesk:wght@400;500;700&display=swap"
        rel="stylesheet" />

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        neon: '#39ff14',
                        boboBlue: '#00e0ff',
                    },
                    fontFamily: {
                        bobo: ['"Bagel Fat One"', 'cursive'],
                    },
                }
            }
        }
    </script>

    <style>
        /* Global font */
        *,
        *::before,
        *::after {
            font-family: 'Space Grotesk', sans-serif;
        }

        h1, h2, h3, h4, button {
            font-family: 'Pixelify Sans', monospace;
        }

        /* ── Page system ─────────────────────────── */
        .page {
            display: none;
            position: fixed;
            inset: 0;
            overflow-y: auto;
            overflow-x: hidden;
        }

        .page.active {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* ── Neon glow animations ────────────────── */
        @keyframes glow-pulse {

            0%,
            100% {
                text-shadow: 0 0 10px #FFA7A7, 0 0 30px #FFA7A7, 0 0 60px #FFA7A7;
            }

            50% {
                text-shadow: 0 0 20px #FFA7A7, 0 0 60px #FFA7A7, 0 0 120px #FFA7A7;
            }
        }

        @keyframes btn-pulse {

            0%,
            100% {
                box-shadow: 0 0 0 2px #FFA7A7, 0 0 14px rgba(255, 167, 167, .4);
            }

            50% {
                box-shadow: 0 0 0 4px #FFA7A7, 0 0 30px rgba(255, 167, 167, .5);
            }
        }

        @keyframes fade-up {
            from {
                opacity: 0;
                transform: translateY(24px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slide-in {
            from {
                opacity: 0;
                transform: translateX(-24px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .neon-title {
            color: #FFA7A7;
            animation: glow-pulse 2.5s ease-in-out infinite;
        }

        .fade-up {
            animation: fade-up 0.75s ease both;
        }

        .slide-in {
            animation: slide-in 0.45s ease both;
        }

        .btn-neon-solid {
            background: #FFA7A7;
            color: #000;
            border-radius: 14px;
            animation: btn-pulse 2s infinite;
            transition: transform .18s, box-shadow .18s;
        }

        .btn-neon-solid:hover {
            transform: translateY(-3px) scale(1.04);
            box-shadow: 0 0 28px rgba(255, 167, 167, .7), 0 8px 28px rgba(0, 0, 0, .5);
        }

        .btn-neon-solid:active {
            transform: scale(.97);
        }

        .btn-neon-outline {
            background: transparent;
            color: #FFA7A7;
            border: 3px solid #FFA7A7;
            border-radius: 9999px;
            box-shadow: 0 0 12px rgba(255, 167, 167, .3);
            transition: background .18s, color .18s, transform .18s, box-shadow .18s;
        }

        .btn-neon-outline:hover {
            background: #FFA7A7;
            color: #000;
            transform: translateY(-3px);
            box-shadow: 0 0 28px #FFA7A7, 0 6px 20px rgba(0, 0, 0, .5);
        }

        .btn-neon-outline:active {
            transform: scale(.97);
        }

        /* form rows stagger */
        .form-row:nth-child(1) {
            animation-delay: .05s;
        }

        .form-row:nth-child(2) {
            animation-delay: .10s;
        }

        .form-row:nth-child(3) {
            animation-delay: .15s;
        }

        .form-row:nth-child(4) {
            animation-delay: .20s;
        }

        .form-row:nth-child(5) {
            animation-delay: .25s;
        }

        /* wallet input focus ring */
        .wallet-wrap:focus-within {
            border-color: #FFA7A7;
            box-shadow: 0 0 14px rgba(255, 167, 167, .4);
        }

        /* table row zebra on hover */
        .checker-table tbody tr:hover {
            background: rgba(255, 167, 167, .04);
        }

        /* ── Page 1 responsive background ───────── */
        .bg-page1 {
            background: url('/artwork/BANNER-1.png') center center / cover no-repeat;
        }
    </style>
</head>

<body class="bg-black text-white overflow-hidden">


    <!-- ════════════════════════════════════════════
       PAGE 1 — EXPLORE
  ════════════════════════════════════════════ -->
    <section id="page-explore" class="page active">

        <!-- BG only — no overlay -->
        <div class="bg-page1 absolute inset-0 z-0"></div>

        <!-- Button centered in the middle -->
        <div class="relative z-10 flex items-center justify-center w-full h-full fade-up pt-40">
            <button onclick="showPage('page-action')" class="btn-neon-solid px-14 py-4 cursor-pointer border-0"
                style="font-family:'Bagel Fat One',cursive; font-weight:400; font-style:normal; font-size:20px; line-height:100%; letter-spacing:0;">
                EXPLORE FUGLY
            </button>
        </div>

    </section>


    <!-- ════════════════════════════════════════════
       PAGE 2 — ACTION (APPLY WL / CHECKER)
  ════════════════════════════════════════════ -->
    <section id="page-action" class="page">

        <!-- BG — full cover -->
        <div class="absolute inset-0 z-0" style="background: url('/artwork/BANNER-2.png') center center / cover no-repeat;">
        </div>
        <!-- Dark overlay so text and buttons pop -->
        <div class="absolute inset-0 z-10"
            style="background: linear-gradient(to bottom, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0.45) 55%, rgba(0,0,0,0.80) 100%);">
        </div>

        <!-- Back button -->
        <button onclick="showPage('page-explore')"
            class="absolute top-5 left-5 z-30 cursor-pointer bg-black/50 border border-white/25 text-white/80 hover:border-[#A7D7FF] hover:text-[#A7D7FF] hover:bg-[#A7D7FF]/10 backdrop-blur-sm rounded-full px-5 py-2 text-xs tracking-widest transition-all">←
            BACK</button>

        <!-- Content pinned to bottom -->
        <div
            class="relative z-20 w-full flex flex-col items-start justify-end flex-1 gap-4 px-8 md:px-20 pb-16 pt-10 fade-up">

            <!-- Buttons -->
            <div class="flex flex-col gap-3 w-full max-w-xs sm:max-w-sm mt-1">
                <button onclick="showPage('page-apply')"
                    class="w-full py-4 cursor-pointer border-0 rounded-2xl transition-all hover:-translate-y-1 hover:shadow-[0_0_24px_rgba(167,215,255,0.5)] active:scale-95"
                    style="background:#A7D7FF; color:#000; font-family:'Jersey 25', sans-serif; font-size:1.8rem; font-weight:400; font-style:normal; line-height:100%; letter-spacing:0;">
                    APPLY WL
                </button>
                <button onclick="loadCheckerPage()"
                    class="w-full py-4 cursor-pointer border-0 rounded-2xl transition-all hover:-translate-y-1 hover:shadow-[0_0_24px_rgba(167,215,255,0.5)] active:scale-95"
                    style="background:#A7D7FF; color:#000; font-family:'Jersey 25', sans-serif; font-size:1.8rem; font-weight:400; font-style:normal; line-height:100%; letter-spacing:0;">
                    CHECKER
                </button>
            </div>
        </div>

    </section>


    <!-- ════════════════════════════════════════════
       PAGE 3 — APPLY WHITELIST FORM
  ════════════════════════════════════════════ -->
    <section id="page-apply" class="page" style="background-color: #FF9393; justify-content: flex-start;">

        <!-- Back -->
        <div class="w-full flex justify-start">
            <button onclick="showPage('page-action')"
                class="absolute top-5 left-5 z-30 cursor-pointer bg-black text-white hover:bg-neutral-800 rounded-full px-5 py-2 text-xs tracking-widest transition-all border-0">←
                BACK</button>
        </div>

        <div class="w-full max-w-[480px] px-5 pt-8 pb-14 flex flex-col items-center gap-5 fade-up">

            <!-- Title -->
            <h1 class="text-black text-3xl tracking-widest text-center" style="font-family:'Bagel Fat One', cursive;">
                APPLY WHITELIST
            </h1>

            <!-- Form card -->
            <div
                class="w-full rounded-[2.2rem] border-[6px] border-black bg-[#ffd5ec] p-6 flex flex-col gap-4 shadow-xl">

                <!-- Follow BOBO -->
                <div
                    class="form-row slide-in flex items-center justify-between gap-3 bg-black text-white rounded-2xl px-5 py-3.5 border-0">
                    <span class="flex-1 text-white text-xs sm:text-sm tracking-wide font-bobo">FOLLOW FUGLYFAM</span>
                    <a href="https://x.com/fuglyfam"
                        class="bg-white text-black rounded-lg px-5 py-2 text-xs font-bobo cursor-pointer border-0 hover:bg-neutral-200 transition-all">Follow</a>
                </div>

                <!-- Like pinned post -->
                <div
                    class="form-row slide-in flex items-center justify-between gap-3 bg-black text-white rounded-2xl px-5 py-3.5 border-0">
                    <span class="flex-1 text-white text-xs sm:text-sm tracking-wide font-bobo">Like pinned post</span>
                    <input id="apply-username" type="text" placeholder="Username"
                        class="w-32 bg-white text-black text-center rounded-lg px-2 py-2 text-xs outline-none placeholder-black/40 font-bobo border-0" />
                </div>

                <!-- QT pinned post -->
                <div
                    class="form-row slide-in flex items-center justify-between gap-3 bg-black text-white rounded-2xl px-5 py-3.5 border-0">
                    <span class="flex-1 text-white text-xs sm:text-sm tracking-wide font-bobo leading-tight">
                        QT pinned post with<br>fuglys are coming
                    </span>
                    <input id="apply-qt-link" type="text" placeholder="QT Link"
                        class="w-32 bg-white text-black text-center rounded-lg px-2 py-2 text-xs outline-none placeholder-black/40 font-bobo border-0" />
                </div>

                <!-- 3 Friends -->
                <div
                    class="form-row slide-in flex items-center justify-between gap-3 bg-black text-white rounded-2xl px-5 py-3.5 border-0">
                    <span class="flex-1 text-white text-xs sm:text-sm tracking-wide font-bobo">3 Friends on pinned
                        post</span>
                    <input id="apply-comment-link" type="text" placeholder="Comment link"
                        class="w-32 bg-white text-black text-center rounded-lg px-2 py-2 text-xs outline-none placeholder-black/40 font-bobo border-0" />
                </div>

                <!-- EVM Wallet -->
                <div
                    class="form-row slide-in flex items-center justify-between gap-3 bg-black text-white rounded-2xl px-5 py-3.5 border-0">
                    <span class="flex-1 text-white text-xs sm:text-sm tracking-wide font-bobo">SUBMIT EVM WALLET</span>
                    <input id="apply-wallet" type="text" placeholder="0x......."
                        class="w-32 bg-white text-black text-center rounded-lg px-2 py-2 text-xs outline-none placeholder-black/40 font-bobo border-0" />
                </div>

                <!-- Submit -->
                <button onclick="submitWhitelist()"
                    class="self-center bg-black text-white rounded-xl px-10 py-2.5 text-base font-bobo cursor-pointer border-0 hover:bg-neutral-800 transition-all mt-2">
                    SUBMIT
                </button>
            </div>

        </div>
    </section>


    <!-- ════════════════════════════════════════════
       PAGE 4 — CHECKER
  ════════════════════════════════════════════ -->
    <section id="page-checker" class="page" style="background-color: #77EBFF; justify-content: flex-start;">

        <!-- Back -->
        <div class="w-full flex justify-start">
            <button onclick="showPage('page-action')"
                class="absolute top-5 left-5 z-30 cursor-pointer bg-black text-white hover:bg-neutral-800 rounded-full px-5 py-2 text-xs tracking-widest transition-all border-0">←
                BACK</button>
        </div>

        <div class="w-full max-w-[580px] px-5 pt-20 pb-14 flex flex-col items-center gap-6 fade-up">

            <!-- Wallet search input -->
            <div class="w-full">
                <input id="wallet-search-input" type="text" placeholder="Paste Wallet address"
                    oninput="filterWallets(this.value)"
                    class="w-full text-center text-black placeholder-black/50 text-base py-4 px-6 rounded-2xl border-0 outline-none shadow-md font-bobo"
                    style="background-color: #D9D9D9;" />
            </div>

            <!-- Table -->
            <div class="w-full rounded-[2rem] overflow-hidden shadow-lg" style="background-color: #D9D9D9;">
                <table class="w-full border-collapse">
                    <thead>
                        <tr class="border-b border-black">
                            <th class="py-4 px-6 text-center text-black text-base font-bobo tracking-widest border-r border-black"
                                style="width: 100px;">NO</th>
                            <th class="py-4 px-6 text-center text-black text-base font-bobo tracking-widest">WALLETS
                            </th>
                        </tr>
                    </thead>
                    <tbody id="wallet-table-body">
                        <!-- Filled dynamically -->
                    </tbody>
                </table>
            </div>

        </div>
    </section>





    <!-- ════════════════════════════════════════════
       SCRIPTS
  ════════════════════════════════════════════ -->
    <script>
        // ── Page navigation ───────────────────────
        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            const el = document.getElementById(id);
            el.classList.add('active');
            el.scrollTop = 0;
        }

        // ── Apply Whitelist API submission ────────
        async function submitWhitelist() {
            const username = document.getElementById('apply-username').value.trim();
            const qtLink = document.getElementById('apply-qt-link').value.trim();
            const commentLink = document.getElementById('apply-comment-link').value.trim();
            const wallet = document.getElementById('apply-wallet').value.trim();

            if (!username) {
                alert('Please enter your username');
                return;
            }

            const isTwitter = (url) => url.includes('twitter.com') || url.includes('x.com');

            if (!isTwitter(qtLink)) {
                alert('QT link must be a valid Twitter/X link');
                return;
            }

            if (!isTwitter(commentLink)) {
                alert('Comment link must be a valid Twitter/X link');
                return;
            }

            if (!wallet.match(/^0x[a-fA-F0-9]{40}$/)) {
                alert('EVM Wallet must be a valid 0x address');
                return;
            }

            try {
                const response = await fetch('api.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, qtLink, commentLink, wallet })
                });
                const result = await response.json();
                alert(result.message);
                if (result.success) {
                    // Clear inputs
                    document.getElementById('apply-username').value = '';
                    document.getElementById('apply-qt-link').value = '';
                    document.getElementById('apply-comment-link').value = '';
                    document.getElementById('apply-wallet').value = '';
                    showPage('page-action');
                }
            } catch (error) {
                alert('Failed to submit application. Database or server error.');
            }
        }

        // ── Checker & List Search logic ────────────
        let allWallets = [];

        async function fetchWallets() {
            try {
                const response = await fetch('api.php?list=true');
                const result = await response.json();
                if (result.success) {
                    allWallets = result.wallets || [];
                    renderWallets(allWallets);
                } else {
                    console.error(result.message);
                }
            } catch (error) {
                console.error('Failed to fetch wallets', error);
            }
        }

        function renderWallets(walletsList) {
            const tbody = document.getElementById('wallet-table-body');
            tbody.innerHTML = '';

            if (walletsList.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="2" class="py-8 text-center text-black/50 text-sm font-bobo">No wallets found</td>
                    </tr>
                `;
                return;
            }

            walletsList.forEach((wallet, index) => {
                const tr = document.createElement('tr');
                tr.className = 'border-b border-black/10';
                tr.innerHTML = `
                    <td class="py-3 px-6 text-black text-sm font-bobo text-center border-r border-black font-mono">${index + 1}</td>
                    <td class="py-3 px-6 text-black text-sm font-mono break-all text-center">${wallet}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function filterWallets(query) {
            const q = query.trim().toLowerCase();
            if (!q) {
                renderWallets(allWallets);
                return;
            }
            const filtered = allWallets.filter(w => w.toLowerCase().includes(q));
            renderWallets(filtered);
        }

        async function loadCheckerPage() {
            showPage('page-checker');
            const searchInput = document.getElementById('wallet-search-input');
            if (searchInput) {
                searchInput.value = '';
            }
            await fetchWallets();
        }

    </script>

</body>

</html>
