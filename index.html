    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
    
    <style>
      /* Smooth Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 10px;
      }
      ::-webkit-scrollbar-track {
        background: #000;
        border-left: 2px solid #222;
      }
      ::-webkit-scrollbar-thumb {
        background: #FF9393;
        border: 2px solid #000;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #77EBFF;
      }
      
      :root {
        --cream: #F5EDD6;
        --blue: #3B82F6;
        --purple: #8B5CF6;
        --teal: #06B6D4;
        --pink: #F472B6;
        --yellow: #FACC15;
        --dark: #1E1040;
      }

      * { box-sizing: border-box; }

      body, button, input, select, textarea {
        font-family: 'Fredoka', sans-serif;
        font-weight: 500;
        background-color: var(--cream);
        color: var(--dark);
      }

      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-8px); }
      }

      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(24px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      @keyframes pop {
        0%   { transform: scale(1); }
        50%  { transform: scale(1.06); }
        100% { transform: scale(1); }
      }

      .float    { animation: float 3s ease-in-out infinite; }
      .fade-up  { animation: fadeUp 0.55s ease both; }

      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: #EDE0BC; border-radius: 99px; }
      ::-webkit-scrollbar-thumb { background: #8B5CF6; border-radius: 99px; }
      ::-webkit-scrollbar-thumb:hover { background: #7C3AED; }
      
      /* Neon Glow utilities */
      .glow-pink {
        text-shadow: 0 0 10px #FFA7A7, 0 0 30px #FFA7A7;
      }
      .glow-cyan {
        text-shadow: 0 0 10px #77EBFF, 0 0 30px #77EBFF;
      }
      .glow-neon {
        text-shadow: 0 0 10px #39ff14, 0 0 20px #39ff14;
      }
    </style>
  </head>
  <body class="h-full m-0 overflow-x-hidden">

    <script type="module" src="/src/main.tsx"></script>
  </body>
